<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
    <defs>
        <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#d4d4d4"/>
        </linearGradient>
        
        <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#f472b6"/>
            <stop offset="50%" stop-color="#ec4899"/>
            <stop offset="100%" stop-color="#db2777"/>
        </linearGradient>
        
        <clipPath id="boltMask">
            <path d="M288 64 L144 288 H264 L216 448 L408 192 H272 Z"/>
        </clipPath>
    </defs>

    <!-- Fondo negro puro estilo Vercel -->
    <rect width="512" height="512" rx="112" fill="#000000"/>
    
    <!-- Rayo geométrico limpio y preciso -->
    <path d="M288 64 L144 288 H264 L216 448 L408 192 H272 Z" 
          fill="url(#boltGrad)"/>
    
    <!-- Línea de energía rosa que corta el rayo -->
    <line x1="80" y1="240" x2="432" y2="240" 
          stroke="url(#accentGrad)" 
          stroke-width="8" 
          stroke-linecap="square"
          clip-path="url(#boltMask)"/>
    
    <!-- Pequeño cuadrado de acento en la intersección -->
    <rect x="252" y="228" width="24" height="24" fill="#f472b6" rx="2"/>
</svg>