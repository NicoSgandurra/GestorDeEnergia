<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
    <defs>
        <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#d4d4d4"/>
        </linearGradient>
        <clipPath id="boltClip">
            <path d="M288 72 L152 288 H264 L220 440 L400 200 H272 Z"/>
        </clipPath>
    </defs>

    <!-- Fondo negro redondeado -->
    <rect width="512" height="512" rx="108" fill="#000000"/>
    
    <!-- Rayo blanco con gradiente sutil (capa 1) -->
    <path d="M288 72 L152 288 H264 L220 440 L400 200 H272 Z" 
          fill="url(#boltGrad)"/>
    
    <!-- Línea punteada roja SOBRE el rayo con efecto de corte (capa 2) -->
    <line x1="80" y1="210" x2="432" y2="210" 
          stroke="#ff003c" 
          stroke-width="8" 
          stroke-linecap="round"
          stroke-dasharray="24,14"
          clip-path="url(#boltClip)"/>
    
    <!-- Borde negro interior que enmarca el rayo (efecto de profundidad) -->
    <path d="M288 72 L152 288 H264 L220 440 L400 200 H272 Z" 
          fill="none" 
          stroke="#000000" 
          stroke-width="12"
          stroke-linejoin="round"/>
    
    <!-- Texto -->
    <text x="256" y="488" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="600" fill="#555555" letter-spacing="3">PICO-CERO</text>
</svg>