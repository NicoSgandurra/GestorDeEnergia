<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f0f9ff"/>
            <stop offset="100%" stop-color="#e0f2fe"/>
        </linearGradient>
        <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1e3a5f"/>
            <stop offset="100%" stop-color="#2563eb"/>
        </linearGradient>
        <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#f472b6"/>
            <stop offset="100%" stop-color="#ec4899"/>
        </linearGradient>
        <clipPath id="boltClip">
            <path d="M288 72 L152 288 H264 L220 440 L400 200 H272 Z"/>
        </clipPath>
    </defs>

    <!-- Fondo pastel azul -->
    <rect width="512" height="512" rx="108" fill="url(#bgGrad)"/>
    <rect width="512" height="512" rx="108" fill="none" stroke="#bae6fd" stroke-width="2"/>
    
    <!-- Rayo azul oscuro sobre fondo pastel -->
    <path d="M288 72 L152 288 H264 L220 440 L400 200 H272 Z" 
          fill="url(#boltGrad)"/>
    
    <!-- Línea punteada rosa que contrasta con el azul -->
    <line x1="80" y1="210" x2="432" y2="210" 
          stroke="url(#accentGrad)" 
          stroke-width="8" 
          stroke-linecap="round"
          stroke-dasharray="20,16"
          clip-path="url(#boltClip)"/>
    
    <!-- Texto -->
    <text x="256" y="488" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="600" fill="#94a3b8" letter-spacing="3">PICO-CERO</text>
</svg>