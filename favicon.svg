<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
    <defs>
        <linearGradient id="boltGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#e5e5e5"/>
        </linearGradient>
        
        <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#f472b6"/>
            <stop offset="100%" stop-color="#ec4899"/>
        </linearGradient>
        
        <clipPath id="boltClip">
            <path d="M288 72 L152 288 H264 L220 440 L400 200 H272 Z"/>
        </clipPath>
    </defs>

    <!-- Fondo oscuro estilo Vercel -->
    <rect width="512" height="512" rx="108" fill="#000000"/>
    
    <!-- Borde exterior muy sutil -->
    <rect width="512" height="512" rx="108" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    
    <!-- Rayo geométrico principal -->
    <path d="M288 72 L152 288 H264 L220 440 L400 200 H272 Z" 
          fill="url(#boltGradient)"/>
    
    <!-- Línea punteada rosa - límite máximo de consumo -->
    <line x1="96" y1="248" x2="416" y2="248" 
          stroke="url(#accentGradient)" 
          stroke-width="5" 
          stroke-linecap="round"
          stroke-dasharray="2,8"
          clip-path="url(#boltClip)"
          opacity="0.95"/>
    
    <!-- Líneas de energía sutiles en la parte superior derecha -->
    <line x1="336" y1="128" x2="356" y2="168" stroke="#222222" stroke-width="3" stroke-linecap="round"/>
    <line x1="360" y1="144" x2="380" y2="184" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
    <line x1="384" y1="160" x2="404" y2="200" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Texto "PICO-CERO" completo en la parte inferior -->
    <text x="256" y="488" 
          text-anchor="middle"
          font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
          font-size="28" 
          font-weight="600"
          fill="#333333" 
          letter-spacing="4">PICO-CERO</text>
</svg>