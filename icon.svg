<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <!-- Clip path usando la silueta del rayo -->
        <clipPath id="rayoClip">
            <path d="M288 80 L160 288 H256 L224 432 L384 208 H272 Z" />
        </clipPath>
    </defs>

    <!-- Fondo oscuro minimalista (Vercel Style) -->
    <rect width="512" height="512" rx="112" fill="#0a0a0a" stroke="#333333" stroke-width="8"/>
    
    <!-- Rayo geométrico y limpio en blanco tiza -->
    <path d="M288 80 L160 288 H256 L224 432 L384 208 H272 Z" fill="#ededed" />
    
    <!-- Línea roja punteada fina (Límite de consumo) enmascarada DENTRO del rayo -->
    <line x1="0" y1="224" x2="512" y2="224" stroke="#ff003c" stroke-width="8" stroke-dasharray="16, 16" stroke-linecap="round" clip-path="url(#rayoClip)" />
</svg>
